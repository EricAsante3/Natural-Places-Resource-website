name: Long Hello World Workflow

on:
  push:
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Hello
        run: echo "Hello from Job 1"

      - name: Step 2 - Loop task
        run: |
          for i in {1..20}
          do
            echo "Job1 running iteration $i"
            sleep 5
          done

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: Step 1 - Processing
        run: |
          for i in {1..15}
          do
            echo "Processing task $i"
            sleep 6
          done

      - name: Step 2 - More work
        run: |
          for i in {1..10}
          do
            echo "More work $i"
            sleep 8
          done

  job3:
    runs-on: ubuntu-latest
    needs: job2
    steps:
      - name: Final Job
        run: |
          for i in {1..12}
          do
            echo "Finalizing step $i"
            sleep 10
          done

      - name: Done
        run: echo "Workflow finished!"
